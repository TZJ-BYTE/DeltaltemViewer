<div class="col-lg-3 col-md-4 col-sm-6 mb-4">
    <div class="store-card">
        <div class="item-image" style="cursor: pointer;" onclick="showItemAnalysis('{{ item.name }}')">
            {% if item.image_url %}
                <img src="{{ item.image_url }}" alt="{{ item.name }}" class="img-fluid" 
                     style="max-height: 180px; object-fit: cover;" 
                     onerror="this.parentElement.innerHTML='<i class=\'fas fa-cube\'></i>'">
            {% else %}
                <i class="fas fa-cube"></i>
            {% endif %}
        </div>
        <div class="card-body p-3">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <h6 class="card-title mb-0 text-truncate" title="{{ item.name }}">
                    {{ item.name }}
                </h6>
                <span class="item-category">{{ item.category }}</span>
            </div>
            <div class="mb-2">
                <span class="item-price {{ 'currency-rmb' if item.currency == '人民币' else 'currency-gold' }}">
                    {{ "%.0f"|format(item.price) }} {{ item.currency }}
                </span>
            </div>
            <small class="text-muted">
                <i class="fas fa-clock me-1"></i>{{ item.crawl_time | format_time }}
            </small>
            <div class="mt-2">
                <small class="badge bg-secondary">{{ item.source }}</small>
            </div>
        </div>
    </div>
</div>
